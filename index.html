/* ═══════════════════════════════════════════════════════════════
   FIREBASE HOOK
═══════════════════════════════════════════════════════════════ */
function useFirebase() {
  const [ready, setReady] = useState(!!window.__firebase);
  useEffect(() => {
    if (window.__firebase) { setReady(true); return; }
    const h = () => setReady(true);
    window.addEventListener('firebase-ready', h);
    return () => window.removeEventListener('firebase-ready', h);
  }, []);
  return ready ? window.__firebase : null;
}

function useFirestoreCollection(fb, colName, fallback) {
  const [data, setData] = useState(fallback);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    if (!fb?.isConfigured || !fb.db) {
      setData(fallback);
      setLoaded(true);
      return;
    }
    const unsub = fb.onSnapshot(fb.collection(fb.db, colName), snap => {
      const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      setData(docs.length > 0 ? docs : fallback);
      setLoaded(true);
    });
    return unsub;
  }, [fb?.isConfigured]);

  const upsert = useCallback(async (item) => {
    if (!fb?.isConfigured || !fb.db) {
      setData(p => p.find(x => x.id === item.id) ? p.map(x => x.id === item.id ? item : x) : [...p, item]);
      return;
    }
    const { id, ...rest } = item;
    await fb.setDoc(fb.doc(fb.db, colName, id), { ...rest, _updated: fb.serverTimestamp() });
  }, [fb?.isConfigured]);

  const remove = useCallback(async (id) => {
    if (!fb?.isConfigured || !fb.db) {
      setData(p => p.filter(x => x.id !== id));
      return;
    }
    await fb.deleteDoc(fb.doc(fb.db, colName, id));
  }, [fb?.isConfigured]);

  const setAll = useCallback(async (items) => {
    if (!fb?.isConfigured || !fb.db) {
      setData(items);
      return;
    }
    // batch write
    const batch = fb.writeBatch(fb.db);
    // first delete existing
    const snap = await new Promise(res => {
      const unsub = fb.onSnapshot(fb.collection(fb.db, colName), s => { unsub(); res(s); });
    });
    snap.docs.forEach(d => batch.delete(d.ref));
    items.forEach(item => {
      const { id, ...rest } = item;
      batch.set(fb.doc(fb.db, colName, id), { ...rest, _updated: fb.serverTimestamp() });
    });
    await batch.commit();
  }, [fb?.isConfigured]);

  return { data, setData, loaded, upsert, remove, setAll };
}

/* ═══════════════════════════════════════════════════════════════
   CSV HELPERS
═══════════════════════════════════════════════════════════════ */
function downloadCSV(filename, headers, rows) {
  const esc = v => '"' + String(v ?? '').replace(/"/g, '""') + '"';
  const lines = [headers.map(esc).join(','), ...rows.map(r => r.map(esc).join(','))];
  const blob = new Blob(['\uFEFF' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return { headers: [], rows: [] };
  const parseLine = line => {
    const result = []; let current = ''; let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const char = line[i]; const next = line[i + 1];
      if (char === '"') { if (inQuotes && next === '"') { current += '"'; i++; } else { inQuotes = !inQuotes; } }
      else if (char === ',' && !inQuotes) { result.push(current); current = ''; }
      else { current += char; }
    }
    result.push(current);
    return result;
  };
  return { headers: parseLine(lines[0]), rows: lines.slice(1).map(parseLine) };
}

function PrjPage({ prjs, upsertPrj, deletePrj, setPrjs }) {
  const [exp,     setExp]     = useState({});
  const [adding,  setAdding]  = useState(null);
  const [val,     setVal]     = useState("");
  const [val2,    setVal2]    = useState("");
  const [editPrj, setEditPrj] = useState(null);
  const [editSub, setEditSub] = useState(null);

  const toggle = id => setExp(p => ({...p, [id]:!p[id]}));

  const doAdd = async () => {
    if (!val.trim()) return;
    if (adding.type==="prj") {
      const item = { id:`p-${Date.now()}`, nr:val.trim(), naam:val2.trim(), subs:[] };
      await upsertPrj(item);
    } else if (adding.type==="sub") {
      const prj = prjs.find(p => p.id===adding.prjId);
      if (!prj) return;
      const updated = {...prj, subs:[...prj.subs, {id:`s-${Date.now()}`, naam:val.trim(), rks:[]}]};
      await upsertPrj(updated);
    } else if (adding.type==="rk") {
      for (const prj of prjs) {
        const sub = prj.subs.find(s => s.id===adding.subId);
        if (sub) {
          const updated = {...prj, subs:prj.subs.map(s => s.id===adding.subId ? {...s, rks:[...s.rks, val.trim()]} : s)};
          await upsertPrj(updated);
          break;
        }
      }
    }
    setAdding(null); setVal(""); setVal2("");
  };

  const saveEditPrj = async () => {
    if (!editPrj?.nr) return;
    const prj = prjs.find(p => p.id===editPrj.id);
    await upsertPrj({...prj, nr:editPrj.nr, naam:editPrj.naam});
    setEditPrj(null);
  };

  const saveEditSub = async () => {
    if (!editSub?.naam) return;
    const prj = prjs.find(p => p.subs.some(s => s.id===editSub.subId));
    if (!prj) return;
    await upsertPrj({...prj, subs:prj.subs.map(s => s.id===editSub.subId ? {...s, naam:editSub.naam} : s)});
    setEditSub(null);
  };

  const delPrj = async id => {
    if (!window.confirm('Project verwijderen?')) return;
    await deletePrj(id);
  };

  const delSub = async (prjId, subId) => {
    if (!window.confirm('Subproject verwijderen?')) return;
    const prj = prjs.find(p => p.id===prjId);
    await upsertPrj({...prj, subs:prj.subs.filter(s => s.id!==subId)});
  };

  const delRK = async (subId, rk) => {
    if (!window.confirm(`Regelkast "${rk}" verwijderen?`)) return;
    for (const prj of prjs) {
      const sub = prj.subs.find(s => s.id===subId);
      if (sub) {
        await upsertPrj({...prj, subs:prj.subs.map(s => s.id===subId ? {...s, rks:s.rks.filter(r=>r!==rk)} : s)});
        break;
      }
    }
  };

  const csvPrjs = () => {
    const rows = [];
    prjs.forEach(p => {
      p.subs.forEach(s => {
        if (s.rks.length>0) s.rks.forEach(rk => rows.push([p.nr, p.naam, s.naam, rk]));
        else rows.push([p.nr, p.naam, s.naam, '']);
      });
      if (p.subs.length===0) rows.push([p.nr, p.naam, '', '']);
    });
    downloadCSV('projecten.csv', ['Projectnummer','Projectnaam','Subproject','Regelkast'], rows);
  };

  return React.createElement("div", { style:{ maxWidth:900 }},
    React.createElement(PH, { title:`Projecten (${prjs.length})`, action:
      React.createElement(React.Fragment, null,
        React.createElement(CsvBtn, { onClick:csvPrjs }),
        React.createElement("button", { onClick:()=>{ setAdding({type:"prj"}); setVal(""); setVal2(""); }, style:btn() }, "+ Nieuw project")
      )
    }),
    adding?.type==="prj" && React.createElement("div", { style:card({ border:`1px solid ${C.acc}40`, marginBottom:20 })},
      React.createElement(SH, { t:"Nieuw project" }),
      React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }},
        React.createElement(FI, { label:"Projectnummer *", value:val,  onChange:e=>setVal(e.target.value),  placeholder:"PRJ-2024-020" }),
        React.createElement(FI, { label:"Projectnaam",     value:val2, onChange:e=>setVal2(e.target.value), placeholder:"Naam van project" })
      ),
      React.createElement("div", { style:{ display:"flex", gap:8 }},
        React.createElement("button", { onClick:doAdd, style:btn() }, "+ Toevoegen"),
        React.createElement("button", { onClick:()=>setAdding(null), style:btn(C.mut,false) }, "Annuleren")
      )
    ),
    prjs.map(prj => React.createElement("div", { key:prj.id, style:card() },
      editPrj?.id===prj.id
        ? React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr auto", gap:10, alignItems:"end", marginBottom:14 }},
            React.createElement(FI, { label:"Projectnummer *", value:editPrj.nr,   onChange:e=>setEditPrj(p=>({...p,nr:e.target.value})) }),
            React.createElement(FI, { label:"Projectnaam",     value:editPrj.naam, onChange:e=>setEditPrj(p=>({...p,naam:e.target.value})) }),
            React.createElement("div", { style:{ paddingTop:18, display:"flex", gap:6 }},
              React.createElement("button", { onClick:saveEditPrj, style:{...btn(), padding:"7px 12px"} }, "✓"),
              React.createElement("button", { onClick:()=>setEditPrj(null), style:{...btn(C.mut,false), padding:"7px 12px"} }, "✕")
            )
          )
        : React.createElement("div", { style:{ display:"flex", alignItems:"center", gap:12, paddingBottom:exp[prj.id]?14:0, marginBottom:exp[prj.id]?14:0, borderBottom:exp[prj.id]?`1px solid ${C.bdr}`:"none" }},
            React.createElement("span", { onClick:()=>toggle(prj.id), style:{ color:C.acc, fontFamily:"monospace", fontSize:12, cursor:"pointer", userSelect:"none" }}, exp[prj.id]?"▾":"▸"),

              React.createElement("span", { style:{ fontWeight:800, color:C.acc, fontSize:13 }}, prj.nr),

                `${prj.subs.length} subproject${prj.subs.length!==1?"en":""}`)
            ),
            React.createElement("div", { style:{ display:"flex", gap:5 }},
              React.createElement("button", { onClick:()=>setEditPrj({id:prj.id, nr:prj.nr, naam:prj.naam}), style:ibtn(C.blue) }, "✏"),
              React.createElement("button", { onClick:()=>delPrj(prj.id), style:ibtn(C.red) }, "🗑")
            )
          ),
      exp[prj.id] && React.createElement("div", null,
        prj.subs.map(sub => React.createElement("div", { key:sub.id, style:{ background:C.bg, border:`1px solid ${C.bdr}`, borderRadius:4, padding:"10px 14px", marginBottom:6 }},
          editSub?.subId===sub.id
            ? React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"1fr auto", gap:10, alignItems:"end", marginBottom:8 }},
                React.createElement(FI, { label:"Subproject naam *", value:editSub.naam, onChange:e=>setEditSub(p=>({...p,naam:e.target.value})) }),
                React.createElement("div", { style:{ paddingTop:18, display:"flex", gap:6 }},
                  React.createElement("button", { onClick:saveEditSub, style:{...btn(), padding:"7px 12px"} }, "✓"),
                  React.createElement("button", { onClick:()=>setEditSub(null), style:{...btn(C.mut,false), padding:"7px 12px"} }, "✕")
                )
              )
            : React.createElement("div", { style:{ display:"flex", alignItems:"center", gap:10 }},
                React.createElement("span", { onClick:()=>toggle(sub.id), style:{ color:C.blue, fontSize:11, cursor:"pointer", userSelect:"none" }}, exp[sub.id]?"▾":"▸"),
                React.createElement("span", { onClick:()=>toggle(sub.id), style:{ fontWeight:600, cursor:"pointer", flex:1 }}, sub.naam),
                React.createElement("span", { style:{ fontSize:11, color:C.mut }}, `${sub.rks.length} regelkast${sub.rks.length!==1?"en":""}`),
                React.createElement("div", { style:{ display:"flex", gap:5, marginLeft:8 }},

                  React.createElement("button", { onClick:()=>setEditSub({prjId:prj.id, subId:sub.id, naam:sub.naam}), style:ibtn(C.blue,{fontSize:10}) }, "✏"),
                  React.createElement("button", { onClick:()=>delSub(prj.id, sub.id), style:ibtn(C.red,{fontSize:10}) }, "🗑")
                )
              ),
          (exp[sub.id] || (adding?.type==="rk" && adding.subId===sub.id)) && React.createElement("div", { style:{ display:"flex", flexWrap:"wrap", gap:6, marginTop:10 }},

/* ═══════════════════════════════════════════════════════════════
   OVERZICHT — multi-select filter + artikel drill-down
═══════════════════════════════════════════════════════════════ */
function OvzPage({ assets, prjs, bests }) {
  const [selPrjs, setSelPrjs] = useState(new Set());
  const [selSubs, setSelSubs] = useState(new Set());
  const [selRKs,  setSelRKs]  = useState(new Set());
  const [selArt,  setSelArt]  = useState("");
  const [tab,     setTab]     = useState("types");

  // All available RKs given prj/sub selection
  const scopeRKs = useMemo(() => {
    const ps = selPrjs.size > 0 ? prjs.filter(p => selPrjs.has(p.id)) : prjs;
    return ps.flatMap(p => (selSubs.size > 0 ? p.subs.filter(s => selSubs.has(s.id)) : p.subs).flatMap(s => s.rks));
  }, [prjs, selPrjs, selSubs]);

  const allSubsForSel = useMemo(() => {
    const ps = selPrjs.size > 0 ? prjs.filter(p => selPrjs.has(p.id)) : prjs;
    return ps.flatMap(p => p.subs.map(s => ({...s, prjNr: p.nr})));
  }, [prjs, selPrjs]);

  const filtered = useMemo(() => {
    return assets.filter(a => {
      const rkOk = selRKs.size > 0 ? selRKs.has(a.rk) : scopeRKs.includes(a.rk) || selPrjs.size===0;
      const artOk = selArt ? `${a.merk}||${a.type}` === selArt : true;
      return rkOk && artOk;
    });
  }, [assets, selRKs, scopeRKs, selPrjs, selArt]);

  // All unique article types in system
  const allArtTypes = useMemo(() => {
    const m = {};
    assets.forEach(a => { const k=`${a.merk}||${a.type}`; m[k]={merk:a.merk,type:a.type,k}; });
    return Object.values(m).sort((a,b) => a.merk.localeCompare(b.merk));
  }, [assets]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(a => {
      const k=`${a.merk}||${a.type}`;
      if (!g[k]) g[k]={ merk:a.merk, type:a.type, total:0, beschikbaar:0, uitgegeven:0, rks:new Set(), items:[] };
      g[k].total++; g[k][a.st]++; g[k].rks.add(a.rk); g[k].items.push(a);
    });
    return Object.values(g).map(x=>({...x, rks:[...x.rks]}));
  }, [filtered]);

  // Drill-down: items for selected art
  const drillItems = useMemo(() => {
    if (!selArt) return [];
    return filtered;
  }, [filtered, selArt]);

  const toggle = (set, setter, val) => {
    setter(p => { const n = new Set(p); n.has(val) ? n.delete(val) : n.add(val); return n; });
  };

  const csvOvz = () => downloadCSV('overzicht.csv',
    ['Merk','Type','Totaal','Beschikbaar','Uitgegeven','Regelkasten'],
    grouped.map(g => [g.merk, g.type, g.total, g.beschikbaar, g.uitgegeven, g.rks.join('; ')])
  );

  const chipStyle = (active) => ({
    background: active ? "rgba(245,158,11,.15)" : C.bg,
    border: `1px solid ${active ? C.acc : C.bdr}`,
    color: active ? C.acc : C.mut,
    borderRadius:3, padding:"3px 10px", fontSize:11, cursor:"pointer", fontWeight:active?700:400,
    fontFamily:"'Courier New',monospace"
  });

  return React.createElement("div", null,
    React.createElement(PH, { title:"Overzicht componenten", action: React.createElement(CsvBtn, { onClick:csvOvz }) }),

    // Filter panel
    React.createElement("div", { style:card() },
      React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:16 }},
        // Projects multi-select
        React.createElement("div", null,
          React.createElement("label", { style:lbl }, "Projecten"),
          React.createElement("div", { style:{ display:"flex", flexWrap:"wrap", gap:5, marginTop:4 }},
            prjs.map(p => React.createElement("button", { key:p.id, onClick:()=>toggle(selPrjs,setSelPrjs,p.id), style:chipStyle(selPrjs.has(p.id)) },
              p.nr
            ))
          )
        ),
        // Subprojects multi-select
        React.createElement("div", null,
          React.createElement("label", { style:lbl }, "Subprojecten"),
          React.createElement("div", { style:{ display:"flex", flexWrap:"wrap", gap:5, marginTop:4 }},
            allSubsForSel.map(s => React.createElement("button", { key:s.id, onClick:()=>toggle(selSubs,setSelSubs,s.id), style:chipStyle(selSubs.has(s.id)) },
              s.naam
            ))
          )
        ),
        // RKs multi-select
        React.createElement("div", null,

    reader.readAsText(file); e.target.value='';
  };
  const resetBest=()=>{ if(!window.confirm('Alle bestellingen wissen?')) return; bestStore.setAll([]); };

  const exportAsset = () => downloadCSV('assets.csv',['Regelkast','Opnemercode','Merk','Type','Status','Uitgiftedatum','Aan wie','Firma'],assets.map(a=>[a.rk,a.opcode,a.merk,a.type,a.st,a.uitDat||'',a.aan||'',a.firma||'']));
  const importAsset = e => {
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const {rows}=parseCSV(ev.target.result);
      const imported=rows.map(r=>({id:`as-${Date.now()}-${Math.random()}`,rk:r[0]||'',opcode:r[1]||'',merk:r[2]||'',type:r[3]||'',st:r[4]||'beschikbaar',uitDat:r[5]||'',aan:r[6]||'',firma:r[7]||'',artId:''}));
      assetStore.setAll(imported); alert(`${imported.length} assets geïmporteerd`);
    };
    reader.readAsText(file); e.target.value='';
  };
  const resetAsset=()=>{ if(!window.confirm('Alle assets wissen?')) return; assetStore.setAll([]); };

  const sections = [
    { t:"Leveranciers",  count:levs.length,   unit:"leverancier",  exp:exportLev,   imp:()=>fileInputLev.current?.click(),   ref:fileInputLev,   onChange:importLev,   reset:resetLev },
    { t:"Projecten",     count:prjs.length,    unit:"project",      exp:exportPrj,   imp:()=>fileInputPrj.current?.click(),   ref:fileInputPrj,   onChange:importPrj,   reset:resetPrj },
    { t:"Bestellingen",  count:bests.length,   unit:"bestelling",   exp:exportBest,  imp:()=>fileInputBest.current?.click(),  ref:fileInputBest,  onChange:importBest,  reset:resetBest },
    { t:"Assetcodering", count:assets.length,  unit:"asset",        exp:exportAsset, imp:()=>fileInputAsset.current?.click(), ref:fileInputAsset, onChange:importAsset, reset:resetAsset },
  ];

  return React.createElement("div", { style:{ maxWidth:900 }},
    React.createElement("div", { style:{ fontSize:11, fontWeight:700, color:C.mut, textTransform:"uppercase", letterSpacing:".08em", marginBottom:16 }}, "Instellingen — Data beheer"),

    // Firebase setup guide
    React.createElement("div", { style:card({ border:`1px solid ${fb?.isConfigured?C.grn+'40':C.acc+'40'}` }) },
      React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }},
        React.createElement(SH, { t:"Firebase configuratie" }),
        React.createElement(Bdg, { v:fb?.isConfigured?"geleverd":"offerte", sm:true })
      ),
      fb?.isConfigured
        ? React.createElement("div", { style:{ color:C.grn, fontSize:12 }}, "✓ Firebase is verbonden. Data wordt automatisch gesynchroniseerd.")
        : React.createElement("div", null,
            React.createElement("div", { style:{ fontSize:12, color:C.mut, marginBottom:12, lineHeight:1.7 }},
              "Om data permanent op te slaan, configureer Firebase Firestore:"
            ),
            React.createElement("ol", { style:{ fontSize:12, color:C.mut, paddingLeft:20, lineHeight:2.2 }},
              React.createElement("li", null, React.createElement("a", { href:"https://console.firebase.google.com", target:"_blank", style:{color:C.blue} }, "console.firebase.google.com"), " → Nieuw project aanmaken"),
              React.createElement("li", null, 'Build → Firestore Database → "Create database" (test mode)'),
              React.createElement("li", null, "Project Settings → Your apps → Web (</>) → App registreren"),
              React.createElement("li", null, "Kopieer de ", React.createElement("code", { style:{background:C.bg, padding:"1px 6px", borderRadius:3, color:C.acc} }, "firebaseConfig"), " uit de SDK snippet"),
              React.createElement("li", null, "Vervang de config bovenaan dit HTML-bestand (zoek naar ", React.createElement("code", { style:{background:C.bg, padding:"1px 6px", borderRadius:3, color:C.acc} }, "JOUW_API_KEY"), ")")
            )
          )
    ),

    sections.map(s => React.createElement("div", { key:s.t, style:card() },
      React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }},
        React.createElement(SH, { t:s.t }),
        React.createElement("div", { style:{ display:"flex", gap:8 }},
          React.createElement("button", { onClick:s.exp,   style:btn(C.grn,  false, { padding:"4px 11px", fontSize:11 }) }, "⬇ Export"),
          React.createElement("button", { onClick:s.imp,   style:btn(C.blue, false, { padding:"4px 11px", fontSize:11 }) }, "⬆ Import"),
          React.createElement("button", { onClick:s.reset, style:btn(C.red,  false, { padding:"4px 11px", fontSize:11 }) }, "🗑 Wissen")
        )
      ),
      React.createElement("input", { ref:s.ref, type:"file", accept:".csv", onChange:s.onChange }),
      React.createElement("div", { style:{ fontSize:12, color:C.mut }},
        `${s.count} ${s.unit}${s.count!==1?"en/s":""} in systeem`
      )
    )),

    React.createElement("div", { style:card({ border:`1px solid ${C.bdr}`, marginTop:8 }) },
      React.createElement("div", { style:{ fontSize:10, color:C.acc, fontWeight:700, marginBottom:8, textTransform:"uppercase", letterSpacing:".06em" }}, "ℹ Instructies"),
      React.createElement("ul", { style:{ fontSize:12, color:C.mut, paddingLeft:20, lineHeight:1.8 }},
        React.createElement("li", null, "Export: Download huidige data als CSV (ook als backup)"),
        React.createElement("li", null, "Import: Upload CSV om data te vervangen (overschrijft bestaande data)"),
        React.createElement("li", null, "Wissen: Verwijder alle data van de betreffende sectie")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
