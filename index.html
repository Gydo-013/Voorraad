/* ═══════════════════════════════════════════════════════════════
   CSV HELPERS
═══════════════════════════════════════════════════════════════ */
function downloadCSV(filename, headers, rows) {
  const esc = v => '"' + String(v ?? '').replace(/"/g, '""') + '"';
  const lines = [headers.map(esc).join(','), ...rows.map(r => r.map(esc).join(','))];
  const blob = new Blob(['\uFEFF' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return { headers: [], rows: [] };
  
  const parseLine = line => {
    const result = [];
    let current = '';
    let inQuotes = false;
    
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      const next = line[i + 1];
      
      if (char === '"') {
        if (inQuotes && next === '"') {
          current += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (char === ',' && !inQuotes) {
        result.push(current);
        current = '';
      } else {
        current += char;
      }
    }
    result.push(current);
    return result;
  };
  
  const headers = parseLine(lines[0]);
  const rows = lines.slice(1).map(parseLine);
  return { headers, rows };
}

  const empty = { naam:"", contact:"", tel:"", email:"", opmerking:"" };

  const set = k => e => setForm(p => ({...p, [k]:e.target.value}));

  const save = () => {
    if (!form?.naam) return;
    if (form.id) setLevs(p => p.map(l => l.id===form.id ? form : l));
    else          setLevs(p => [...p, {...form, id:`l-${Date.now()}`}]);
    setForm(null);
  };

  const del = l => {
    if (!window.confirm(`"${l.naam}" verwijderen?`)) return;
    setLevs(p => p.filter(x => x.id!==l.id));
  };

  const csvLevs = () => downloadCSV('leveranciers.csv',
    ['Naam','Contactpersoon','Telefoon','E-mail','Opmerkingen'],
    levs.map(l => [l.naam, l.contact, l.tel, l.email, l.opmerking])

  return React.createElement("div", { style:{ maxWidth:900 }},
    React.createElement(PH, { title:`Leveranciers (${levs.length})`, action:

          l.email   && React.createElement("span", null, "✉ ", l.email)

function PrjPage({ prjs, setPrjs }) {
  const [exp,     setExp]     = useState({});
  const [adding,  setAdding]  = useState(null);
  const [val,     setVal]     = useState("");
  const [val2,    setVal2]    = useState("");
  const [editPrj, setEditPrj] = useState(null);
  const [editSub, setEditSub] = useState(null);

  const toggle = id => setExp(p => ({...p, [id]:!p[id]}));

  const doAdd = () => {
    if (!val.trim()) return;
    if (adding.type==="prj") {
      setPrjs(p => [...p, { id:`p-${Date.now()}`, nr:val.trim(), naam:val2.trim(), subs:[] }]);
    } else if (adding.type==="sub") {
      setPrjs(p => p.map(prj => prj.id===adding.prjId
        ? {...prj, subs:[...prj.subs, {id:`s-${Date.now()}`, naam:val.trim(), rks:[]}]}
        : prj));
    } else if (adding.type==="rk") {
      setPrjs(p => p.map(prj => ({
        ...prj, subs:prj.subs.map(s => s.id===adding.subId ? {...s, rks:[...s.rks, val.trim()]} : s)
      })));
    }
    setAdding(null); setVal(""); setVal2("");
  };

  const saveEditPrj = () => {
    if (!editPrj?.nr) return;
    setPrjs(p => p.map(prj => prj.id===editPrj.id ? {...prj, nr:editPrj.nr, naam:editPrj.naam} : prj));
    setEditPrj(null);
  };

  const saveEditSub = () => {
    if (!editSub?.naam) return;
    setPrjs(p => p.map(prj => ({
      ...prj, subs:prj.subs.map(s => s.id===editSub.subId ? {...s, naam:editSub.naam} : s)
    })));
    setEditSub(null);
  };

  const delPrj = id => {
    if (!window.confirm('Project verwijderen? Alle subprojecten en regelkasten worden ook verwijderd.')) return;
    setPrjs(p => p.filter(prj => prj.id!==id));
  };

  const delSub = (prjId, subId) => {
    if (!window.confirm('Subproject verwijderen?')) return;
    setPrjs(p => p.map(prj => prj.id===prjId ? {...prj, subs:prj.subs.filter(s => s.id!==subId)} : prj));
  };

  const delRK = (subId, rk) => {
    if (!window.confirm(`Regelkast "${rk}" verwijderen?`)) return;
    setPrjs(p => p.map(prj => ({
      ...prj, subs:prj.subs.map(s => s.id===subId ? {...s, rks:s.rks.filter(r => r!==rk)} : s)
    })));
  };

  const csvPrjs = () => {
    const rows = [];
    prjs.forEach(p => {
      p.subs.forEach(s => {
        if (s.rks.length>0) s.rks.forEach(rk => rows.push([p.nr, p.naam, s.naam, rk]));
        else rows.push([p.nr, p.naam, s.naam, '']);
      });
      if (p.subs.length===0) rows.push([p.nr, p.naam, '', '']);
    });
    downloadCSV('projecten.csv', ['Projectnummer','Projectnaam','Subproject','Regelkast'], rows);
  };

  return React.createElement("div", { style:{ maxWidth:900 }},
    React.createElement(PH, { title:`Projecten (${prjs.length})`, action:
      React.createElement(React.Fragment, null,
        React.createElement(CsvBtn, { onClick:csvPrjs }),
        React.createElement("button", { onClick:()=>{ setAdding({type:"prj"}); setVal(""); setVal2(""); }, style:btn() }, "+ Nieuw project")
      )
    }),
    adding?.type==="prj" && React.createElement("div", { style:card({ border:`1px solid ${C.acc}50`, marginBottom:20 })},
      React.createElement(SH, { t:"Nieuw project" }),
      React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }},
        React.createElement(FI, { label:"Projectnummer *", value:val,  onChange:e=>setVal(e.target.value),  placeholder:"PRJ-2024-020" }),
        React.createElement(FI, { label:"Projectnaam",     value:val2, onChange:e=>setVal2(e.target.value), placeholder:"Naam van project" })
      ),
      React.createElement("div", { style:{ display:"flex", gap:8 }},
        React.createElement("button", { onClick:doAdd, style:btn() }, "+ Toevoegen"),
        React.createElement("button", { onClick:()=>setAdding(null), style:btn(C.mut,false) }, "Annuleren")
      )
    ),

    if (!newBest?.levId||!newBest?.prjId||tempArts.length===0) return;
    const b = { id:`b-${Date.now()}`, ...newBest,

    if (!window.confirm('Bestelling verwijderen?')) return;
    setBests(p => p.filter(b => b.id!==id));

function OvzPage({ assets, prjs }) {
  const [fPrj, setFPrj] = useState("");
  const [fSub, setFSub] = useState("");
  const [fRK,  setFRK]  = useState("");

  const scopeRKs = useMemo(() => {
    const ps = fPrj ? prjs.filter(p=>p.id===fPrj) : prjs;
    return ps.flatMap(p => (fSub?p.subs.filter(s=>s.id===fSub):p.subs).flatMap(s=>s.rks));
  }, [prjs, fPrj, fSub]);

  const filtered = useMemo(() => {
    return assets.filter(a => {
      if (fRK) return a.rk===fRK;
      if (scopeRKs.length>0) return scopeRKs.includes(a.rk);
      return true;
    });
  }, [assets, fRK, scopeRKs]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(a => {
      const k=`${a.merk}||${a.type}`;
      if (!g[k]) g[k]={ merk:a.merk, type:a.type, total:0, beschikbaar:0, uitgegeven:0, rks:new Set() };
      g[k].total++; g[k][a.st]++; g[k].rks.add(a.rk);

      React.createElement(FS, { label:"Subproject", opts:subOpts, value:fSub, onChange:e=>{setFSub(e.target.value);setFRK("");} }),

        { l:"Beschikbaar",     v:filtered.filter(a=>a.st==="beschikbaar").length,  c:C.grn },

      ].map(x => React.createElement("div", { key:x.l, style:card({ textAlign:"center", padding:"14px 12px", marginBottom:0 }) },
        React.createElement("div", { style:{ fontSize:30, fontFamily:"monospace", fontWeight:800, color:x.c }}, x.v),
        React.createElement("div", { style:{ fontSize:10, color:C.mut, fontWeight:700, marginTop:4, textTransform:"uppercase", letterSpacing:".07em" }}, x.l)

      : React.createElement("div", { style:{ background:C.sur, border:`1px solid ${C.bdr}`, borderRadius:8, overflow:"hidden" }},

              ),
              React.createElement("tbody", null,
                uitgegeven.map((a,i) => React.createElement("tr", { key:a.id, style:{ borderBottom:`1px solid ${C.sur2}`, background:i%2?"rgba(255,255,255,.01)":"transparent" }},
                  React.createElement("td", { style:{ padding:"7px 12px", fontFamily:"monospace", fontSize:12 }}, a.uitDat||"—"),
                  React.createElement("td", { style:{ padding:"7px 12px", fontFamily:"monospace", color:C.blue }}, a.rk),
                  React.createElement("td", { style:{ padding:"7px 12px", fontFamily:"monospace", fontWeight:700, color:C.acc }}, a.opcode),
                  React.createElement("td", { style:{ padding:"7px 12px", fontFamily:"monospace", fontWeight:600 }}, a.merk),
                  React.createElement("td", { style:{ padding:"7px 12px", fontFamily:"monospace" }}, a.type),
                  React.createElement("td", { style:{ padding:"7px 12px" }}, a.aan||"—"),
                  React.createElement("td", { style:{ padding:"7px 12px", color:"#94a3b8" }}, a.firma||"—")
                ))
              )
            )
          )
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   PAGINA: INSTELLINGEN (NIEUWE PAGINA)
═══════════════════════════════════════════════════════════════ */
function InstPage({ levs, setLevs, prjs, setPrjs, bests, setBests, assets, setAssets }) {
  const fileInputLev = useRef(null);
  const fileInputPrj = useRef(null);
  const fileInputBest = useRef(null);
  const fileInputAsset = useRef(null);

  // ──────── LEVERANCIERS ────────
  const exportLev = () => downloadCSV('leveranciers.csv',
    ['Naam','Contactpersoon','Telefoon','E-mail','Opmerkingen'],
    levs.map(l => [l.naam, l.contact, l.tel, l.email, l.opmerking])
  );

  const importLev = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const { headers, rows } = parseCSV(ev.target.result);
      const imported = rows.map(r => ({
        id: `l-${Date.now()}-${Math.random()}`,
        naam: r[0] || '',
        contact: r[1] || '',
        tel: r[2] || '',
        email: r[3] || '',
        opmerking: r[4] || ''
      }));
      setLevs(imported);
      alert(`${imported.length} leveranciers geïmporteerd`);
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const resetLev = () => {
    if (!window.confirm('Weet je zeker dat je alle leveranciers wilt wissen?')) return;
    setLevs([]);
  };

  // ──────── PROJECTEN ────────
  const exportPrj = () => {
    const rows = [];
    prjs.forEach(p => {
      p.subs.forEach(s => {
        if (s.rks.length > 0) s.rks.forEach(rk => rows.push([p.nr, p.naam, s.naam, rk]));
        else rows.push([p.nr, p.naam, s.naam, '']);
      });
      if (p.subs.length === 0) rows.push([p.nr, p.naam, '', '']);
    });
    downloadCSV('projecten.csv', ['Projectnummer','Projectnaam','Subproject','Regelkast'], rows);
  };

  const importPrj = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const { headers, rows } = parseCSV(ev.target.result);
      const prjMap = {};
      
      rows.forEach(r => {
        const prjNr = r[0]?.trim();
        const prjNaam = r[1]?.trim();
        const subNaam = r[2]?.trim();
        const rk = r[3]?.trim();
        
        if (!prjNr) return;
        
        if (!prjMap[prjNr]) {
          prjMap[prjNr] = { id: `p-${Date.now()}-${Math.random()}`, nr: prjNr, naam: prjNaam || '', subs: [] };
        }
        
        if (subNaam) {
          let sub = prjMap[prjNr].subs.find(s => s.naam === subNaam);
          if (!sub) {
            sub = { id: `s-${Date.now()}-${Math.random()}`, naam: subNaam, rks: [] };
            prjMap[prjNr].subs.push(sub);
          }
          if (rk && !sub.rks.includes(rk)) {
            sub.rks.push(rk);
          }
        }
      });
      
      const imported = Object.values(prjMap);
      setPrjs(imported);
      alert(`${imported.length} projecten geïmporteerd`);
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const resetPrj = () => {
    if (!window.confirm('Weet je zeker dat je alle projecten wilt wissen?')) return;
    setPrjs([]);
  };

  // ──────── BESTELLINGEN ────────
  const exportBest = () => {
    const rows = [];
    bests.forEach(b => {
      const lev = levs.find(l => l.id === b.levId);
      const prj = prjs.find(p => p.id === b.prjId);
      const sub = prjs.find(p => p.id === b.prjId)?.subs.find(s => s.id === b.subId);
      (b.arts.length > 0 ? b.arts : [{}]).forEach(a => {
        rows.push([
          b.status, lev?.naam || '', prj?.nr || '', sub?.naam || '',
          b.offNr || '', b.offDat || '', b.ioNr || '', b.bestDat || '',
          b.obNr || '', b.levBestNr || '', b.verwLev || '', b.pbNr || '', b.levDat || '',
          a.merk || '', a.type || '', a.n || '', a.opm || ''
        ]);
      });
    });
    downloadCSV('bestellingen.csv',
      ['Status','Leverancier','Project','Subproject','Offertenr','Offertedatum','IO Nr','Besteldatum','OB Nr','Lev.bestelnr','Verw.levering','Pakbonnr','Leverdatum','Merk','Type','Aantal','Opmerking'],
      rows
    );
  };

  const importBest = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const { headers, rows } = parseCSV(ev.target.result);
      const bestMap = {};
      
      rows.forEach(r => {
        const status = r[0]?.trim();
        const levNaam = r[1]?.trim();
        const prjNr = r[2]?.trim();
        const subNaam = r[3]?.trim();
        const ioNr = r[6]?.trim();
        
        if (!status) return;
        
        const lev = levs.find(l => l.naam === levNaam);
        const prj = prjs.find(p => p.nr === prjNr);
        const sub = prj?.subs.find(s => s.naam === subNaam);
        
        const key = `${status}-${levNaam}-${prjNr}-${subNaam}-${ioNr}`;
        
        if (!bestMap[key]) {
          bestMap[key] = {
            id: `b-${Date.now()}-${Math.random()}`,
            levId: lev?.id || '',
            prjId: prj?.id || '',
            subId: sub?.id || '',
            status: status,
            heeftOff: !!r[4],
            offNr: r[4] || '',
            offDat: r[5] || '',
            ioNr: r[6] || '',
            bestDat: r[7] || '',
            obNr: r[8] || '',
            levBestNr: r[9] || '',
            verwLev: r[10] || '',
            pbNr: r[11] || '',
            levDat: r[12] || '',
            arts: []
          };
        }
        
        const merk = r[13]?.trim();
        const type = r[14]?.trim();
        if (merk && type) {
          bestMap[key].arts.push({
            id: `a-${Date.now()}-${Math.random()}`,
            merk: merk,
            type: type,
            n: parseInt(r[15]) || 1,
            opm: r[16] || ''
          });
        }
      });
      
      const imported = Object.values(bestMap);
      setBests(imported);
      alert(`${imported.length} bestellingen geïmporteerd`);
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const resetBest = () => {
    if (!window.confirm('Weet je zeker dat je alle bestellingen wilt wissen?')) return;
    setBests([]);
  };

  // ──────── ASSETS ────────
  const exportAsset = () => downloadCSV('assets.csv',
    ['Regelkast','Opnemercode','Merk','Type','Status','Uitgiftedatum','Aan wie','Firma'],
    assets.map(a => [a.rk, a.opcode, a.merk, a.type, a.st, a.uitDat || '', a.aan || '', a.firma || ''])
  );

  const importAsset = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const { headers, rows } = parseCSV(ev.target.result);
      const imported = rows.map(r => ({
        id: `as-${Date.now()}-${Math.random()}`,
        rk: r[0] || '',
        opcode: r[1] || '',
        merk: r[2] || '',
        type: r[3] || '',
        st: r[4] || 'beschikbaar',
        uitDat: r[5] || '',
        aan: r[6] || '',
        firma: r[7] || '',
        artId: ''
      }));
      setAssets(imported);
      alert(`${imported.length} assets geïmporteerd`);
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const resetAsset = () => {
    if (!window.confirm('Weet je zeker dat je alle assets wilt wissen?')) return;
    setAssets([]);
  };

  return React.createElement("div", { style:{ maxWidth:900 }},
    React.createElement("div", { style:{ fontSize:11, fontWeight:700, color:C.mut, textTransform:"uppercase", letterSpacing:".08em", marginBottom:20 }}, "Instellingen — Data beheer"),
    
    // LEVERANCIERS
    React.createElement("div", { style:card() },
      React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }},
        React.createElement(SH, { t:"Leveranciers" }),
        React.createElement("div", { style:{ display:"flex", gap:8 }},
          React.createElement("button", { onClick:exportLev, style:btn(C.grn, false, { padding:"5px 12px", fontSize:11 }) }, "⬇ Exporteren"),
          React.createElement("button", { onClick:()=>fileInputLev.current?.click(), style:btn(C.blue, false, { padding:"5px 12px", fontSize:11 }) }, "⬆ Importeren"),
          React.createElement("button", { onClick:resetLev, style:btn(C.red, false, { padding:"5px 12px", fontSize:11 }) }, "🗑 Wissen")
        )
      ),
      React.createElement("input", { ref:fileInputLev, type:"file", accept:".csv", onChange:importLev }),
      React.createElement("div", { style:{ fontSize:12, color:C.mut }}, 
        `${levs.length} leverancier${levs.length !== 1 ? 's' : ''} in systeem`
      )
    ),

    // PROJECTEN
    React.createElement("div", { style:card() },
      React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }},
        React.createElement(SH, { t:"Projecten" }),
        React.createElement("div", { style:{ display:"flex", gap:8 }},
          React.createElement("button", { onClick:exportPrj, style:btn(C.grn, false, { padding:"5px 12px", fontSize:11 }) }, "⬇ Exporteren"),
          React.createElement("button", { onClick:()=>fileInputPrj.current?.click(), style:btn(C.blue, false, { padding:"5px 12px", fontSize:11 }) }, "⬆ Importeren"),
          React.createElement("button", { onClick:resetPrj, style:btn(C.red, false, { padding:"5px 12px", fontSize:11 }) }, "🗑 Wissen")
        )
      ),
      React.createElement("input", { ref:fileInputPrj, type:"file", accept:".csv", onChange:importPrj }),
      React.createElement("div", { style:{ fontSize:12, color:C.mut }}, 
        `${prjs.length} project${prjs.length !== 1 ? 'en' : ''} in systeem`
      )
    ),

    // BESTELLINGEN
    React.createElement("div", { style:card() },
      React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }},
        React.createElement(SH, { t:"Bestellingen" }),
        React.createElement("div", { style:{ display:"flex", gap:8 }},
          React.createElement("button", { onClick:exportBest, style:btn(C.grn, false, { padding:"5px 12px", fontSize:11 }) }, "⬇ Exporteren"),
          React.createElement("button", { onClick:()=>fileInputBest.current?.click(), style:btn(C.blue, false, { padding:"5px 12px", fontSize:11 }) }, "⬆ Importeren"),
          React.createElement("button", { onClick:resetBest, style:btn(C.red, false, { padding:"5px 12px", fontSize:11 }) }, "🗑 Wissen")
        )
      ),
      React.createElement("input", { ref:fileInputBest, type:"file", accept:".csv", onChange:importBest }),
      React.createElement("div", { style:{ fontSize:12, color:C.mut }}, 
        `${bests.length} bestelling${bests.length !== 1 ? 'en' : ''} in systeem`
      )
    ),

    // ASSETS
    React.createElement("div", { style:card() },
      React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }},
        React.createElement(SH, { t:"Assetcodering" }),
        React.createElement("div", { style:{ display:"flex", gap:8 }},
          React.createElement("button", { onClick:exportAsset, style:btn(C.grn, false, { padding:"5px 12px", fontSize:11 }) }, "⬇ Exporteren"),
          React.createElement("button", { onClick:()=>fileInputAsset.current?.click(), style:btn(C.blue, false, { padding:"5px 12px", fontSize:11 }) }, "⬆ Importeren"),
          React.createElement("button", { onClick:resetAsset, style:btn(C.red, false, { padding:"5px 12px", fontSize:11 }) }, "🗑 Wissen")
        )
      ),
      React.createElement("input", { ref:fileInputAsset, type:"file", accept:".csv", onChange:importAsset }),
      React.createElement("div", { style:{ fontSize:12, color:C.mut }}, 
        `${assets.length} asset${assets.length !== 1 ? 's' : ''} gecodeerd`
      )
    ),

    React.createElement("div", { style:card({ border:`1px solid ${C.acc}40`, marginTop:24 }) },
      React.createElement("div", { style:{ fontSize:11, color:C.acc, fontWeight:700, marginBottom:8 }}, "ℹ Instructies"),
      React.createElement("ul", { style:{ fontSize:12, color:C.mut, paddingLeft:20, lineHeight:1.6 }},
        React.createElement("li", null, "Exporteren: Download de huidige data als CSV-bestand"),
        React.createElement("li", null, "Importeren: Upload een CSV-bestand om data te vervangen (huidige data wordt overschreven)"),
        React.createElement("li", null, "Wissen: Verwijder alle data van de betreffende pagina (na bevestiging)")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
